name: PR
on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

env:
  # Opt into Node 24 now for any JS action still declaring Node 20.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      BUILD_ID: ${{ github.run_number }}
      COMMIT_SHA: ${{ github.sha }}
      BUILT_AT: ${{ github.event.pull_request.updated_at || github.event.head_commit.timestamp }}
      BUILT_BY: ${{ github.actor }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with: { version: 9 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Astro check
        run: pnpm exec astro check
      - name: Build
        run: pnpm build
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Smoke tests
        run: pnpm test:smoke
      - name: Accessibility tests
        run: pnpm exec playwright test tests/a11y.spec.ts
      - name: Lighthouse CI
        run: pnpm test:lh
      - name: Link check
        run: pnpm test:links
      - name: Meta check
        run: pnpm test:meta

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    env:
      BUILD_ID: ${{ github.run_number }}
      COMMIT_SHA: ${{ github.sha }}
      BUILT_AT: ${{ github.event.pull_request.updated_at }}
      BUILT_BY: ${{ github.actor }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with: { version: 9 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Deploy to Cloudflare Pages preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=clueless-creations-site --branch=${{ github.head_ref }} --commit-dirty=true
      - name: Comment preview URL on PR
        if: steps.deploy.outputs.deployment-url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          gh pr comment "$PR_NUMBER" --body "🚀 Preview deployed
          - Branch alias: ${ALIAS_URL:-n/a}
          - This deploy: $DEPLOY_URL"
